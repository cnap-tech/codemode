version: "3"

set: [errexit, pipefail]

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  build:
    desc: Build all packages
    cmds:
      - pnpm -r run build

  dev:
    desc: Build codemode in watch mode
    cmds:
      - pnpm --filter @robinbraemer/codemode dev

  test:
    desc: Run tests
    cmds:
      - pnpm --filter @robinbraemer/codemode test {{.CLI_ARGS}}

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - pnpm --filter @robinbraemer/codemode test:watch {{.CLI_ARGS}}

  lint:
    desc: Lint and type-check
    cmds:
      - pnpm oxlint
      - pnpm -r run typecheck

  example:
    desc: Run the Petstore demo
    deps: [build]
    cmds:
      - pnpm --filter @robinbraemer/codemode exec tsx examples/petstore.ts

  example:mcp:
    desc: Run the Petstore MCP server
    deps: [build]
    cmds:
      - pnpm --filter @robinbraemer/codemode exec tsx examples/petstore-mcp-server.ts

  ci:
    desc: Run full CI pipeline (lint + test + build)
    cmds:
      - task: lint
      - task: test
      - task: build
