[package]
name = "llrt_node"
version = "0.1.2"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
llrt_core = { path = "../vendor/llrt/llrt_core", default-features = false, features = ["macro", "tls-ring", "crypto-rust"] }
llrt_json = { path = "../vendor/llrt/libs/llrt_json" }
napi = { version = "3", features = ["async"] }
napi-derive = "3"
rquickjs = { version = "0.12", features = ["futures", "parallel", "rust-alloc"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[build-dependencies]
napi-build = "2"
